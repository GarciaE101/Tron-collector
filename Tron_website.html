<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TRON: Legacy Collection Tracker</title>
  <link rel="icon" type="image/x-icon" href="disc-logo.jpg">
  <link rel="stylesheet" href="Tron_website.css">
</head>
<body>

  <header class="wrap">
    <h1 class="title">TRON: LEGACY COLLECTION</h1>
    
    <div class="overall-progress-container">
      <div class="progress-label">Total Collection Progress: <span id="total-percent">0%</span></div>
      <div class="progress-bar-bg">
        <div id="progress-bar-fill" class="progress-bar-fill"></div>
      </div>
      <div class="worth-label">Total Worth: <span id="total-worth">$0.00</span></div>
    </div>

    <div class="search-container">
      <input type="text" id="collectionSearch" placeholder="Search by name, panel number, or character..." onkeyup="filterCollection()">
      <select id="statusFilter" onchange="filterCollection()">
        <option value="all">All Items</option>
        <option value="owned">✅ Owned Only</option>
        <option value="favorites">⭐ Favorites Only</option>
        <option value="wishlist">🎁 Wishlist Only</option>
      </select>
    </div>
  </header>

  <div class="main-container wrap">
    <nav class="sidebar">
      <h3>Categories</h3>
      <ul id="category-list"></ul>
    </nav>

    <main class="content">
      <div id="collection-grid" class="grid"></div>
    </main>
  </div>

  <button id="backToTop" class="back-to-top" title="Back to Top">↑</button>
  <button id="resetCollected" class="reset-btn">Reset All Data</button>

  <footer>
    <p>Hello, my name is Steve and I have created this website for entertainment. If you have any questions, message me via email at: <strong>Penan101@gmail.com</strong></p>
  </footer>

  <script src="Tron_website.js"></script>
</body>
</html>
